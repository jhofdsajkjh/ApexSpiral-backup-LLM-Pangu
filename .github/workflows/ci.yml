name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml requests

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Run DeltaG specific tests
      run: |
        python -m pytest tests/test_delta_g.py -v

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Check syntax
      run: |
        python -m py_compile core/delta_g_formula.py
        python -m py_compile engine/llm_hook.py
        python -m py_compile emotion/emotion_core.py
        python -m py_compile auto-agent/self_inspect.py
